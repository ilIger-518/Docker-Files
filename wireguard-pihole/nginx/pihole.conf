# Nginx reverse proxy for the Pi-hole web dashboard
#
# Usage:
#   sudo cp pihole.conf /etc/nginx/sites-available/pihole
#   sudo ln -s /etc/nginx/sites-available/pihole /etc/nginx/sites-enabled/pihole
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Replace "pihole.example.com" with your actual domain or server IP.

server {
    listen 80;
    server_name pihole.example.com;

    # Redirect bare root to the admin panel
    location = / {
        return 301 /admin/;
    }

    location /admin {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required so Pi-hole's own redirects keep the correct base URL
        proxy_redirect     http://127.0.0.1:8080 http://$host;
    }
}
